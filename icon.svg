<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0f0ff" />
      <stop offset="100%" stop-color="#b5d3ed" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#00e5ff" flood-opacity="0.9"/>
    </filter>

    <clipPath id="cut-top">
      <polygon points="-100,612 612,-100 -100,-100" />
    </clipPath>
    <clipPath id="cut-bottom">
      <polygon points="-100,612 612,612 612,-100" />
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)" />

  <g filter="url(#shadow)">
    <g clip-path="url(#cut-top)" transform="translate(-15, -15)">
      <rect x="156" y="106" width="200" height="300" rx="30" fill="#ff4d4d" stroke="#b30000" stroke-width="16" />
    </g>
    
    <g clip-path="url(#cut-bottom)" transform="translate(15, 15)">
      <rect x="156" y="106" width="200" height="300" rx="30" fill="#ff4d4d" stroke="#b30000" stroke-width="16" />
    </g>
  </g>

  <line x1="80" y1="432" x2="432" y2="80" stroke="#ffffff" stroke-width="24" stroke-linecap="round" filter="url(#glow)" />
  <line x1="80" y1="432" x2="432" y2="80" stroke="#00e5ff" stroke-width="12" stroke-linecap="round" />
  
  <circle cx="360" cy="180" r="10" fill="#ffffff" filter="url(#glow)" />
  <circle cx="140" cy="360" r="14" fill="#ffffff" filter="url(#glow)" />
</svg>
