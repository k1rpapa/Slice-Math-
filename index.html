<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="icon.svg">

<link rel="apple-touch-icon" href="icon.svg">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Slice Math">

<title>Slice Math - 3D Rush (v2.11)</title>
<style>
  :root {
    --bg-color: #e0f0ff;
    --apple-color: #ff4d4d;
    --sync-glow: rgba(0, 180, 255, 0.9);
    --sync-text-color: #00aaff;
    --concrete-color: #888;
    --text-color: #333;
    --floor-light: #cde4f7;
    --floor-dark: #b5d3ed;
  }

  * { box-sizing: border-box; touch-action: none; user-select: none; }

  body {
    margin: 0; padding: 0;
    font-family: 'Hiragino Rounded W8 ProN', 'Hiragino Maru Gothic ProN', sans-serif;
    background-color: var(--bg-color);
    overflow: hidden;
    display: flex; flex-direction: column;
    height: 100dvh; 
  }

  #world {
    flex: 7; 
    width: 100vw;
    position: relative;
    overflow: hidden;
  }

  .layer-3d {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    perspective: 800px; 
    pointer-events: none; 
  }

  #tenkey-container {
    flex: 3; 
    background: #ffffff;
    border-top: 3px solid #b5d3ed;
    display: grid; 
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr); 
    gap: 8px; 
    padding: 10px 15px calc(10px + env(safe-area-inset-bottom)) 15px; 
    z-index: 200; 
    opacity: 0.4; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #tenkey-container.active { 
    opacity: 1; pointer-events: auto; 
  }

  #floor {
    position: absolute;
    top: 50%; left: -50vw;
    width: 200vw; height: 150vh;
    background: repeating-linear-gradient(
      to bottom,
      var(--floor-light), var(--floor-light) 60px,
      var(--floor-dark) 60px, var(--floor-dark) 120px
    );
    transform: rotateX(75deg);
    transform-origin: top center;
    animation: rushForward 0.6s linear infinite;
    mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
  }

  @keyframes rushForward {
    from { background-position: 0 0; }
    to { background-position: 0 120px; }
  }

  #ui-layer {
    position: absolute; top: 15px; left: 15px; z-index: 50;
    font-size: 1.2rem; font-weight: bold; color: var(--text-color);
  }
  #combo { color: #ff8c00; font-size: 1.8rem; margin-top: 5px; opacity: 0; transition: opacity 0.2s;}

  #stage-container {
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    width: 100%; height: 100%; 
    padding-bottom: 25px; 
    transform: translateZ(0px); 
    filter: drop-shadow(0px 30px 20px rgba(0,0,0,0.15));
  }

  #play-area {
    display: flex; justify-content: center; align-items: flex-end;
    gap: 50px; 
    margin-bottom: 30px; 
    position: relative;
  }

  .block-group { display: flex; flex-direction: column; align-items: center; position: relative; }
  .stack { display: flex; flex-direction: column; align-items: center; position: relative; }

  .segment {
    width: 60px; height: 30px;
    background-color: var(--apple-color);
    border: 2px solid #b30000;
    border-radius: 8px; margin-bottom: -4px;
    box-shadow: inset 0px 4px 6px rgba(255,255,255,0.4);
    position: relative; z-index: 2;
  }

  /* ★修正：目盛りを絶対座標（下端固定）の独立レイヤーとして定義 */
  .ruler-container {
    position: absolute;
    bottom: 0; left: -20px;
    width: 20px; height: auto; /* ブロックの高さに合わせて下から上に伸びる */
    pointer-events: none;
    display: flex; flex-direction: column; align-items: flex-end;
    z-index: 5; transition: opacity 0.3s ease;
  }
  .ruler-segment {
    width: 20px; height: 30px; margin-bottom: -4px; position: relative;
  }
  .ruler-segment.mark::after {
    content: ''; position: absolute;
    right: -5px; top: -2px; width: 20px;
    border-top: 3px solid #88aadd; border-radius: 2px;
  }
  .ruler-segment.mark::before {
    content: attr(data-level); position: absolute;
    right: 20px; top: -12px;
    color: #88aadd; font-size: 1.2rem; font-weight: bold;
  }

  .group-label {
    position: absolute; bottom: 15px; left: 50%;
    transform: translate(-50%, 50%);
    font-size: 2.2rem; font-weight: bold;
    color: rgba(255, 255, 255, 0.95);
    text-shadow: 0px 2px 6px rgba(179, 0, 0, 0.8);
    pointer-events: none; z-index: 20; transition: opacity 0.2s ease;
  }

  #equation-area {
    font-size: 3.5rem; font-weight: bold; color: var(--text-color);
    background: rgba(255,255,255,0.95); 
    padding: 8px 30px; border-radius: 20px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1); 
  }

  .sync-text { color: var(--sync-text-color); animation: syncPulseText 0.8s infinite alternate; }
  .sync-target { animation: syncPulse 0.8s infinite alternate; }

  @keyframes syncPulseText {
    from { text-shadow: 0 0 0px transparent; filter: brightness(1); }
    to { text-shadow: 0 0 16px var(--sync-glow); filter: brightness(1.2); }
  }
  @keyframes syncPulse {
    from { box-shadow: 0 0 0px transparent; filter: brightness(1); }
    to { box-shadow: 0 0 16px 6px var(--sync-glow); filter: brightness(1.2); z-index: 6; }
  }

  .error-shake {
    animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
    background-color: var(--concrete-color) !important;
    border-color: #555 !important; color: white !important;
  }

  @keyframes shake {
    10%, 90% { transform: translate3d(-2px, 0, 0); }
    20%, 80% { transform: translate3d(4px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
    40%, 60% { transform: translate3d(6px, 0, 0); }
  }

  .highlight-answer { animation: pulse 0.5s infinite alternate ease-in-out; }
  @keyframes pulse {
    from { filter: drop-shadow(0 0 0px transparent); }
    to { filter: drop-shadow(0 0 12px rgba(255, 77, 77, 1)) brightness(1.3); }
  }

  #swipe-canvas, #particle-canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }
  #swipe-canvas { z-index: 100; pointer-events: auto; }
  #particle-canvas { z-index: 150; pointer-events: none; }
  
  .key {
    background: #f0f8ff; border: 2px solid #b5d3ed; border-radius: 12px;
    font-size: 2.2rem; font-weight: bold; color: #333;
    display: flex; justify-content: center; align-items: center;
    box-shadow: 0 4px 0 #b5d3ed; transition: transform 0.1s, box-shadow 0.1s;
    cursor: pointer; user-select: none;
  }
  .key:active { transform: translateY(4px); box-shadow: 0 0 0 #b5d3ed; }
  .key-empty { pointer-events: none; }
</style>
</head>
<body>

<div id="world">
  <div class="layer-3d" style="z-index: 1;">
    <div id="floor"></div>
  </div>

  <div class="layer-3d" style="z-index: 10;">
    <div id="stage-container">
      <div id="play-area"></div>
      <div id="equation-area"></div>
    </div>
  </div>

  <div id="ui-layer">
    <div>SCORE: <span id="score-val">0</span></div>
    <div id="combo">COMBO!</div>
  </div>

  <canvas id="swipe-canvas"></canvas>
  <canvas id="particle-canvas"></canvas>
</div>

<div id="tenkey-container">
  <div class="key" onpointerdown="handleKey(event, 1)">1</div>
  <div class="key" onpointerdown="handleKey(event, 2)">2</div>
  <div class="key" onpointerdown="handleKey(event, 3)">3</div>
  <div class="key" onpointerdown="handleKey(event, 4)">4</div>
  <div class="key" onpointerdown="handleKey(event, 5)">5</div>
  <div class="key" onpointerdown="handleKey(event, 6)">6</div>
  <div class="key" onpointerdown="handleKey(event, 7)">7</div>
  <div class="key" onpointerdown="handleKey(event, 8)">8</div>
  <div class="key" onpointerdown="handleKey(event, 9)">9</div>
  <div class="key-empty"></div>
  <div class="key" onpointerdown="handleKey(event, 0)">0</div>
  <div class="key-empty"></div>
</div>

<script>
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(type) {
    try {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      if (type === 'slice') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(900, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      } else if (type === 'error') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      } else if (type === 'stack') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      } else if (type === 'tap') { 
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      } else if (type === 'success') { 
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
        osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); 
        osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.3); 
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      }
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); 
      osc.stop(audioCtx.currentTime + (type==='success'? 0.5 : 0.2));
    } catch(e) {}
  }

  const worldEl = document.getElementById('world');
  const canvas = document.getElementById('swipe-canvas');
  const ctx = canvas.getContext('2d');
  const pCanvas = document.getElementById('particle-canvas');
  const pCtx = pCanvas.getContext('2d');

  function resizeCanvas() { 
    canvas.width = worldEl.clientWidth; canvas.height = worldEl.clientHeight; 
    pCanvas.width = worldEl.clientWidth; pCanvas.height = worldEl.clientHeight; 
  }
  window.addEventListener('resize', resizeCanvas);
  setTimeout(resizeCanvas, 50);

  canvas.addEventListener('touchstart', handleStart, {passive: false});
  canvas.addEventListener('touchmove', handleMove, {passive: false});
  canvas.addEventListener('touchend', handleEnd);
  canvas.addEventListener('mousedown', handleStart);
  canvas.addEventListener('mousemove', handleMove);
  canvas.addEventListener('mouseup', handleEnd);

  let isDrawing = false, startX = 0, startY = 0, currentX = 0, currentY = 0;
  let score = 0, comboCount = 0;
  let currentProblem = null;
  let currentInput = ""; 
  let gameState = 'running'; 

  let particles = [];
  const pColors = ['#ff4d4d', '#ffdb4d', '#4dff88', '#4d94ff', '#ff4da6'];
  function spawnConfetti() {
    for(let i=0; i<80; i++) {
      particles.push({
        x: pCanvas.width / 2,
        y: pCanvas.height / 2 + 50,
        vx: (Math.random() - 0.5) * 25,
        vy: (Math.random() - 0.5) * 25 - 10,
        size: Math.random() * 15 + 10,
        color: pColors[Math.floor(Math.random() * pColors.length)],
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 0.4
      });
    }
  }
  function updateParticles() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    if (particles.length > 0) {
      let alive = [];
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.6; 
        p.rot += p.vrot;
        if (p.y < pCanvas.height + 50) alive.push(p);
        
        pCtx.save();
        pCtx.translate(p.x, p.y);
        pCtx.rotate(p.rot);
        pCtx.fillStyle = p.color;
        pCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        pCtx.restore();
      });
      particles = alive;
    }
    requestAnimationFrame(updateParticles);
  }
  updateParticles(); 

  function generateProblem() {
    const a = Math.floor(Math.random() * 8) + 11;
    let b;
    if (Math.random() > 0.5) {
      const ones = a - 10;
      b = Math.floor(Math.random() * (9 - ones)) + ones + 1;
    } else {
      const ones = a - 10;
      b = Math.floor(Math.random() * ones) + 1;
    }
    return { a, b, ones: a - 10 };
  }

  // ★追加：目盛り（ルーラー）を生成する関数
  function createRuler(count) {
    const ruler = document.createElement('div');
    ruler.className = 'ruler-container';
    for(let i=0; i<count; i++) {
      const level = count - i; // 上から下に向かってレベルが下がる
      const rSeg = document.createElement('div');
      rSeg.className = 'ruler-segment';
      if (level === 5 || level === 10) {
        rSeg.classList.add('mark');
        rSeg.dataset.level = level;
      }
      ruler.appendChild(rSeg);
    }
    return ruler;
  }

  // ★追加：合体後に「最終的な答え」に合わせた目盛りを表示する関数
  function showFinalRulers() {
    // 古い目盛りを完全に削除
    document.querySelectorAll('.ruler-container').forEach(r => r.remove());
    const cutFromTens = currentProblem.b > currentProblem.ones;

    if (cutFromTens) {
      // 10の塊が合流し、右側に最終的な答え(7など)がまとまる場合
      const ansRuler = createRuler(currentProblem.a - currentProblem.b);
      ansRuler.style.opacity = '0';
      document.querySelectorAll('.block-group')[1].appendChild(ansRuler); // onesGroupへ追加
      setTimeout(() => ansRuler.style.opacity = '1', 50); // スッと表示
    } else {
      // 10の塊はそのままで、1のバラが削られる場合
      const tensRuler = createRuler(10);
      tensRuler.style.opacity = '0';
      document.querySelectorAll('.block-group')[0].appendChild(tensRuler);
      
      const ansCount = currentProblem.a - currentProblem.b - 10;
      if(ansCount > 0) {
        const ansRuler = createRuler(ansCount);
        ansRuler.style.opacity = '0';
        document.querySelectorAll('.block-group')[1].appendChild(ansRuler);
        setTimeout(() => ansRuler.style.opacity = '1', 50);
      }
      setTimeout(() => tensRuler.style.opacity = '1', 50);
    }
  }

  function loadStage() {
    const playArea = document.getElementById('play-area');
    const eqArea = document.getElementById('equation-area');
    playArea.innerHTML = '';
    
    currentProblem = generateProblem();
    const cutFromTens = currentProblem.b > currentProblem.ones;

    const tensGroup = document.createElement('div');
    tensGroup.className = 'block-group';
    tensGroup.innerHTML = `<div class="group-label">10</div>`;
    
    const tensRemain = document.createElement('div');
    tensRemain.className = 'stack';
    tensRemain.id = 'tens-remain';
    
    const tensCut = document.createElement('div');
    tensCut.className = 'stack';
    tensCut.id = 'tens-cut';
    
    if (cutFromTens) {
      for(let i=0; i<10 - currentProblem.b; i++) tensRemain.innerHTML += `<div class="segment"></div>`;
      for(let i=0; i<currentProblem.b; i++) tensCut.innerHTML += `<div class="segment sync-target"></div>`;
      tensCut.dataset.correct = "true"; tensRemain.dataset.wrong = "true";
    } else {
      for(let i=0; i<10; i++) tensRemain.innerHTML += `<div class="segment"></div>`;
      tensRemain.dataset.wrong = "true";
    }
    tensGroup.appendChild(tensRemain); tensGroup.appendChild(tensCut);
    tensGroup.appendChild(createRuler(10)); // 初期目盛りを追加

    const onesGroup = document.createElement('div');
    onesGroup.className = 'block-group';
    onesGroup.innerHTML = `<div class="group-label">${currentProblem.ones}</div>`;
    
    const onesRemain = document.createElement('div');
    onesRemain.className = 'stack';
    onesRemain.id = 'ones-remain';
    
    const onesCut = document.createElement('div');
    onesCut.className = 'stack';
    onesCut.id = 'ones-cut';

    if (!cutFromTens) {
      for(let i=0; i<currentProblem.ones - currentProblem.b; i++) onesRemain.innerHTML += `<div class="segment"></div>`;
      for(let i=0; i<currentProblem.b; i++) onesCut.innerHTML += `<div class="segment sync-target"></div>`;
      onesCut.dataset.correct = "true"; onesRemain.dataset.wrong = "true";
    } else {
      for(let i=0; i<currentProblem.ones; i++) onesRemain.innerHTML += `<div class="segment"></div>`;
      onesRemain.dataset.wrong = "true";
    }
    onesGroup.appendChild(onesRemain); onesGroup.appendChild(onesCut);
    if (currentProblem.ones > 0) onesGroup.appendChild(createRuler(currentProblem.ones)); // 初期目盛りを追加

    playArea.appendChild(tensGroup); playArea.appendChild(onesGroup);

    eqArea.innerHTML = `${currentProblem.a} - <span class="sync-text">${currentProblem.b}</span> = <span id="answer">?</span>`;
    eqArea.classList.remove('highlight-answer');
    
    document.getElementById('stage-container').style.transform = 'translateZ(0px)';
  }

  loadStage();
  
  setTimeout(() => {
    const stage = document.getElementById('stage-container');
    stage.style.transition = 'none';
    stage.style.transform = 'translateZ(-3000px)';
    stage.style.opacity = '0';
    
    setTimeout(() => {
      stage.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease';
      stage.style.transform = 'translateZ(0px)';
      stage.style.opacity = '1';
      setTimeout(() => { gameState = 'waiting_input'; }, 600);
    }, 50);
  }, 100);

  function handleStart(e) {
    if(gameState !== 'waiting_input') return;
    e.preventDefault(); isDrawing = true;
    
    const rect = canvas.getBoundingClientRect();
    startX = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    startY = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    currentX = startX; currentY = startY;
  }

  function handleMove(e) {
    if (!isDrawing) return; e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    currentX = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    currentY = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    drawSwipeLine();
  }

  function handleEnd(e) {
    if (!isDrawing) return; isDrawing = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    checkCollision();
  }

  function drawSwipeLine() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(currentX, currentY);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)'; ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.shadowBlur = 12; ctx.shadowColor = '#00e5ff'; ctx.stroke();
  }

  function isIntersecting(el) {
    if (!el || el.children.length === 0) return false;
    const rect = el.getBoundingClientRect();
    const cRect = canvas.getBoundingClientRect();
    
    const elTop = rect.top - cRect.top;
    const elBottom = rect.bottom - cRect.top;
    const elLeft = rect.left - cRect.left;
    const elRight = rect.right - cRect.left;

    const steps = 20;
    for (let i = 0; i <= steps; i++) {
      const x = startX + (currentX - startX) * (i / steps);
      const y = startY + (currentY - startY) * (i / steps);
      if (x >= elLeft && x <= elRight && y >= elTop && y <= elBottom) return true;
    }
    return false;
  }

  function checkCollision() {
    const distance = Math.sqrt(Math.pow(currentX - startX, 2) + Math.pow(currentY - startY, 2));
    if (distance < 30) return;

    const correctTarget = document.querySelector('[data-correct="true"]');
    const wrongTargets = document.querySelectorAll('[data-wrong="true"]');

    if (isIntersecting(correctTarget)) {
      executeSlice(correctTarget); return;
    }
    wrongTargets.forEach(target => {
      if (isIntersecting(target)) {
        playSound('error');
        comboCount = 0; document.getElementById('combo').style.opacity = '0';
        const segments = target.querySelectorAll('.segment');
        segments.forEach(s => s.classList.add('error-shake'));
        setTimeout(() => segments.forEach(s => s.classList.remove('error-shake')), 300);
      }
    });
  }

  function executeSlice(targetCut) {
    gameState = 'slicing';
    playSound('slice');

    // ★修正：スライスと同時に古い目盛りとラベルをフェードアウト
    document.querySelectorAll('.group-label, .ruler-container').forEach(l => l.style.opacity = '0');
    
    document.querySelectorAll('.sync-target, .sync-text').forEach(el => {
      el.classList.remove('sync-target', 'sync-text');
      el.style.color = 'var(--text-color)'; el.style.textShadow = 'none';
    });

    targetCut.style.transition = 'transform 0.15s ease-out';
    const rotDir = Math.random() > 0.5 ? 1 : -1;
    targetCut.style.transform = `translateY(-30px) scale(1.05) rotate(${5 * rotDir}deg)`;

    setTimeout(() => {
      targetCut.style.transition = 'transform 0.6s cubic-bezier(0.5, 0, 1, 1)';
      targetCut.style.transform = `translateY(1500px) scale(0.8) rotate(${30 * rotDir}deg)`;
    }, 150);

    const cutFromTens = currentProblem.b > currentProblem.ones;

    setTimeout(() => {
      if (cutFromTens) {
        const tensRemain = document.getElementById('tens-remain');
        const onesRemain = document.getElementById('ones-remain');
        const rRect = tensRemain.getBoundingClientRect();
        const oRect = onesRemain.getBoundingClientRect();
        
        const moveX = oRect.left - rRect.left;
        const moveY = oRect.top - rRect.bottom + 2;

        tensRemain.style.transition = 'transform 0.3s cubic-bezier(0.5, 0, 0.75, 0)';
        tensRemain.style.transform = `translate(${moveX}px, ${moveY}px)`;

        setTimeout(() => { playSound('stack'); promptAnswer(); }, 300);
      } else {
        const onesRemain = document.getElementById('ones-remain');
        if (onesRemain && onesRemain.children.length > 0) {
            const tensRemain = document.getElementById('tens-remain');
            const groundRect = tensRemain.lastElementChild.getBoundingClientRect();
            const targetRect = onesRemain.lastElementChild.getBoundingClientRect();
            const moveY = groundRect.bottom - targetRect.bottom;

            onesRemain.style.transition = 'transform 0.3s cubic-bezier(0.5, 0, 0.75, 0)';
            onesRemain.style.transform = `translateY(${moveY}px)`;
            
            setTimeout(() => { playSound('stack'); promptAnswer(); }, 300);
        } else {
            promptAnswer();
        }
      }
    }, 450); 
  }

  function promptAnswer() {
    gameState = 'waiting_answer';
    currentInput = "";
    document.getElementById('tenkey-container').classList.add('active');
    
    // ★追加：テンキー入力フェーズに入ると同時に、最終的な答えの目盛りを表示する
    showFinalRulers();

    const ansSpan = document.getElementById('answer');
    ansSpan.innerText = '?';
    ansSpan.style.color = 'var(--text-color)';
  }

  function handleKey(e, val) {
    if (gameState !== 'waiting_answer') return;
    e.preventDefault(); e.stopPropagation();
    
    playSound('tap');
    currentInput += val.toString();
    
    const eqArea = document.getElementById('equation-area');
    const ansSpan = document.getElementById('answer');
    ansSpan.innerText = currentInput;
    ansSpan.style.color = '#00aaff'; 

    const targetAnswer = currentProblem.a - currentProblem.b;

    if (parseInt(currentInput) === targetAnswer) {
      gameState = 'finishing';
      document.getElementById('tenkey-container').classList.remove('active');
      
      playSound('success');
      spawnConfetti();

      ansSpan.style.color = '#ff4d4d';
      eqArea.classList.add('highlight-answer');
      document.querySelectorAll('.stack').forEach(stack => {
        if(stack.children.length > 0) stack.classList.add('highlight-answer');
      });

      comboCount++; score += 100 * comboCount;
      document.getElementById('score-val').innerText = score;
      if (comboCount > 1) {
        const comboEl = document.getElementById('combo');
        comboEl.innerText = `${comboCount} COMBO!`;
        comboEl.style.opacity = '1';
      }

      setTimeout(advanceToNextStage, 2200);

    } else if (currentInput.length >= targetAnswer.toString().length) {
      playSound('error');
      comboCount = 0; document.getElementById('combo').style.opacity = '0';
      
      eqArea.classList.add('error-shake');
      ansSpan.style.color = '#ff4d4d';
      
      setTimeout(() => {
        eqArea.classList.remove('error-shake');
        currentInput = "";
        ansSpan.innerText = '?';
        ansSpan.style.color = 'var(--text-color)';
      }, 400);
    }
  }

  function advanceToNextStage() {
    const stage = document.getElementById('stage-container');
    stage.style.transition = 'transform 0.5s ease-in, opacity 0.3s ease-in';
    stage.style.transform = 'translateZ(800px)'; 
    stage.style.opacity = '0';
    
    setTimeout(() => {
      loadStage();
      stage.style.transition = 'none';
      stage.style.transform = 'translateZ(-3000px)'; 
      
      setTimeout(() => {
        stage.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease';
        stage.style.transform = 'translateZ(0px)';
        stage.style.opacity = '1';
        setTimeout(() => { gameState = 'waiting_input'; }, 600);
      }, 50);

    }, 500); 
  }
</script>
</body>
</html>
