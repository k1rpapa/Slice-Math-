<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Slice Math v1.4</title>
<style>
  :root {
    --bg-color: #f0f8ff;
    --apple-color: #ff4d4d;
    --ghost-border: #88aadd;
    --ghost-bg: #eef2f8;
    --sync-glow: rgba(0, 180, 255, 0.9);
    --concrete-color: #888;
    --text-color: #333;
  }

  * { box-sizing: border-box; touch-action: none; }

  body {
    margin: 0; padding: 0;
    font-family: 'Hiragino Rounded W8 ProN', 'Hiragino Maru Gothic ProN', sans-serif;
    background-color: var(--bg-color);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
  }

  #equation-area {
    font-size: 3rem; font-weight: bold; color: var(--text-color);
    margin-bottom: 20px; z-index: 10;
  }

  #play-area {
    display: flex; width: 90%; max-width: 600px;
    height: 60vh; justify-content: space-between;
    position: relative;
  }

  .side {
    width: 45%; display: flex;
    justify-content: center; align-items: flex-end;
    position: relative;
  }

  .block-group {
    display: flex; flex-direction: column; align-items: center;
    position: absolute; bottom: 0;
  }

  .segment {
    width: 60px; height: 30px;
    background-color: var(--apple-color);
    border: 2px solid #b30000;
    border-radius: 8px; margin-bottom: -2px;
    box-shadow: inset 0px 4px 6px rgba(255,255,255,0.4);
    transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease;
    position: relative;
    z-index: 2;
  }

  #remain-group {
    display: flex; flex-direction: column;
    z-index: 10;
  }

  #tens-block { left: 10%; z-index: 5; }
  #ones-block { left: 60%; z-index: 5; }

  #cut-group {
    display: flex; flex-direction: column; position: relative;
  }

  #ghost-container {
    display: flex; flex-direction: column; justify-content: flex-end;
    position: absolute; bottom: 0; left: 20%;
  }
  
  .ghost-segment {
    width: 60px; height: 30px;
    background-color: var(--ghost-bg);
    border: 3px dashed var(--ghost-border);
    border-radius: 8px; margin-bottom: -2px;
    transition: opacity 0.5s ease;
  }

  .sync-target {
    animation: syncPulse 1s infinite alternate;
  }
  .ghost-segment.sync-target {
    animation: syncPulseGhost 1s infinite alternate;
  }

  @keyframes syncPulse {
    from { box-shadow: 0 0 0px transparent; filter: brightness(1); }
    to { box-shadow: 0 0 16px 6px var(--sync-glow); filter: brightness(1.2); z-index: 6; }
  }
  
  @keyframes syncPulseGhost {
    from { box-shadow: 0 0 0px transparent; background-color: var(--ghost-bg); }
    to { box-shadow: 0 0 16px 6px var(--sync-glow); background-color: #cceeff; border-color: #00aaff; }
  }

  #swipe-canvas {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh; z-index: 100;
    pointer-events: auto;
  }

  .error-shake {
    animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    background-color: var(--concrete-color) !important;
    border-color: #555 !important;
  }

  @keyframes shake {
    10%, 90% { transform: translate3d(-2px, 0, 0); }
    20%, 80% { transform: translate3d(4px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
    40%, 60% { transform: translate3d(6px, 0, 0); }
  }

  .highlight-answer {
    animation: pulse 0.8s infinite alternate ease-in-out;
  }
  @keyframes pulse {
    from { filter: drop-shadow(0 0 0px transparent); }
    to { filter: drop-shadow(0 0 10px rgba(255, 77, 77, 0.9)) brightness(1.25); }
  }
</style>
</head>
<body>

<div id="equation-area">11 - 5 = <span id="answer">?</span></div>

<div id="play-area">
  <div class="side" id="left-side">
    <div class="block-group" id="tens-block">
      <div id="remain-group">
        <div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div>
      </div>
      <div id="cut-group">
        <div class="segment sync-target"></div><div class="segment sync-target"></div><div class="segment sync-target"></div><div class="segment sync-target"></div><div class="segment sync-target"></div>
      </div>
    </div>
    <div class="block-group" id="ones-block">
      <div class="segment"></div>
    </div>
  </div>

  <div class="side" id="right-side">
    <div id="ghost-container">
      <div class="ghost-segment sync-target"></div><div class="ghost-segment sync-target"></div><div class="ghost-segment sync-target"></div><div class="ghost-segment sync-target"></div><div class="ghost-segment sync-target"></div>
    </div>
  </div>
</div>

<canvas id="swipe-canvas"></canvas>

<script>
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  function playSound(type) {
    try {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      if (type === 'slice') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
      } else if (type === 'error') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
      } else if (type === 'stack') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
        gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
      } else if (type === 'success') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
      }
    } catch(e) { console.warn("Audio Context is blocked or not supported", e); }
  }

  const canvas = document.getElementById('swipe-canvas');
  const ctx = canvas.getContext('2d');
  let isDrawing = false;
  let startX = 0, startY = 0;
  let currentX = 0, currentY = 0;
  let isSolved = false;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  canvas.addEventListener('touchstart', handleStart, {passive: false});
  canvas.addEventListener('touchmove', handleMove, {passive: false});
  canvas.addEventListener('touchend', handleEnd);
  canvas.addEventListener('mousedown', handleStart);
  canvas.addEventListener('mousemove', handleMove);
  canvas.addEventListener('mouseup', handleEnd);

  function handleStart(e) {
    if(isSolved) return;
    e.preventDefault();
    isDrawing = true;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    startX = clientX; startY = clientY;
    currentX = clientX; currentY = clientY;
  }

  function handleMove(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    currentX = clientX; currentY = clientY;
    drawSwipeLine();
  }

  function handleEnd(e) {
    if (!isDrawing) return;
    isDrawing = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    checkCollision();
  }

  function drawSwipeLine() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(currentX, currentY);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#00e5ff';
    ctx.stroke();
  }

  // ★修正箇所：スワイプの軌跡（線分）が対象を通過したかを正確に判定する処理
  function isIntersecting(el) {
    const rect = el.getBoundingClientRect();
    const steps = 20; // 線を20分割してチェック
    for (let i = 0; i <= steps; i++) {
      const x = startX + (currentX - startX) * (i / steps);
      const y = startY + (currentY - startY) * (i / steps);
      if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
        return true;
      }
    }
    return false;
  }

  function checkCollision() {
    // 誤タップ防止（スワイプ距離が短すぎる場合は何もしない）
    const distance = Math.sqrt(Math.pow(currentX - startX, 2) + Math.pow(currentY - startY, 2));
    if (distance < 30) return;

    const cutGroup = document.getElementById('cut-group');
    const onesBlock = document.getElementById('ones-block').firstElementChild;
    
    // ★修正箇所：正しい切断対象（10の塊）を「最優先」でチェックする
    if (isIntersecting(cutGroup)) {
      executeSliceAnimation();
      return;
    }

    // 正解の対象を掠めておらず、間違ったブロックだけを切ろうとした場合
    if (isIntersecting(onesBlock)) {
      playSound('error');
      onesBlock.classList.add('error-shake');
      setTimeout(() => { onesBlock.classList.remove('error-shake'); }, 400);
    }
  }

  function executeSliceAnimation() {
    if(isSolved) return;
    isSolved = true;
    playSound('slice');

    const cutGroup = document.getElementById('cut-group');
    const ghostContainer = document.getElementById('ghost-container');
    const remainGroup = document.getElementById('remain-group');
    const onesBlock = document.getElementById('ones-block');
    
    document.querySelectorAll('.sync-target').forEach(el => {
      el.classList.remove('sync-target');
    });

    const cutRect = cutGroup.getBoundingClientRect();
    const ghostRect = ghostContainer.getBoundingClientRect();
    const moveCutX = ghostRect.left - cutRect.left;
    const moveCutY = ghostRect.top - cutRect.top;

    cutGroup.style.transform = `translate(${moveCutX}px, ${moveCutY}px)`;
    
    setTimeout(() => {
      cutGroup.style.opacity = '0';
      ghostContainer.style.opacity = '0';
      
      const remainRect = remainGroup.getBoundingClientRect();
      const onesRect = onesBlock.getBoundingClientRect();
      
      const moveRemainX = onesRect.left - remainRect.left;
      const moveRemainY = onesRect.top - remainRect.bottom + 2;

      remainGroup.style.transition = 'transform 0.5s cubic-bezier(0.5, 0, 0.75, 0)'; 
      remainGroup.style.transform = `translate(${moveRemainX}px, ${moveRemainY}px)`;

      setTimeout(() => {
        playSound('stack');
        showAnswer();
      }, 500);

    }, 600);
  }

  function showAnswer() {
    document.getElementById('answer').innerText = '6';
    document.getElementById('answer').style.color = '#ff4d4d';
    
    const remainGroup = document.getElementById('remain-group');
    const onesBlock = document.getElementById('ones-block');
    
    remainGroup.classList.add('highlight-answer');
    onesBlock.classList.add('highlight-answer');

    setTimeout(() => { playSound('success'); }, 200);
  }
</script>
</body>
</html>
